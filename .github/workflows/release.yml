name: release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required: GitHub OIDC token issuance for trusted publishing
      contents: read # required: read access to the repository contents

    env:
      SOLUTION: cqrs-scaffold.sln
      PROJECT: src/CqrsScaffold.Tool/CqrsScaffold.Tool.csproj
      ARTIFACTS: ${{ github.workspace }}/artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      # Gate the release on the same checks as CI before anything is published.
      # The package version is taken from the tag (v1.2.3 -> 1.2.3) via the
      # ${GITHUB_REF_NAME#v} shell expansion, so the tag is the single source
      # of truth and never drifts from the csproj.
      - name: Restore
        run: dotnet restore "$SOLUTION"
      - name: Build
        run: >
          dotnet build "$SOLUTION"
          --no-restore --configuration Release -p:Version="${GITHUB_REF_NAME#v}"
      - name: Test
        run: dotnet test "$SOLUTION" --no-build --configuration Release --nologo
      # --output makes the artifact location explicit so the push step does not
      # depend on the csproj's PackageOutputPath setting.
      - name: Pack
        run: >
          dotnet pack "$PROJECT"
          --no-build --configuration Release -p:Version="${GITHUB_REF_NAME#v}"
          --output "$ARTIFACTS"

      # Exchanges this job's OIDC token for a temporary (1 hour, single-use)
      # NuGet API key. Requires a Trusted Publishing policy on nuget.org for
      # this repo with Workflow File = release.yml.
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # nuget.org profile name, not email
      - name: Publish
        run: >
          dotnet nuget push "$ARTIFACTS"/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
