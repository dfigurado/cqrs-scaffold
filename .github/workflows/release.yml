name: release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required: GitHub OIDC token issuance for trusted publishing
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Gate the release on the same checks as CI before anything is published.
      - name: Restore
        run: dotnet restore cqrs-scaffold.sln

      - name: Build
        run: dotnet build cqrs-scaffold.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test cqrs-scaffold.sln
          --no-build --configuration Release --nologo

      - name: Pack
        run: >
          dotnet pack src/CqrsScaffold.Tool/CqrsScaffold.Tool.csproj
          --no-build --configuration Release

      # Exchanges this job's OIDC token for a temporary (1 hour, single-use)
      # NuGet API key. Requires a Trusted Publishing policy on nuget.org for
      # this repo with Workflow File = release.yml.
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # nuget.org profile name, not email

      - name: Push
        run: >
          dotnet nuget push src/CqrsScaffold.Tool/nupkg/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
